<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rusznikarz Premium</title>

<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Montserrat:wght@300;400&display=swap" rel="stylesheet">

<style>

html {
    scroll-behavior: smooth;
}

body {
    margin:0;
    background:#0a0a0a;
    font-family:Montserrat;
    color:#fff;
    overflow-x:hidden;
}

body::before {
    content:"";
    position:fixed;
    width:100%;
    height:100%;
    background:url('https://www.transparenttextures.com/patterns/black-leather.png');
    opacity:0.25;
    z-index:-1;
}

/* INTRO */
#intro {
    position:fixed;
    width:100%;
    height:100%;
    background:#0a0a0a;
    display:flex;
    justify-content:center;
    align-items:center;
    z-index:9999;
    animation: fadeOut 2s ease forwards;
    animation-delay:1.5s;
}

#intro h1 {
    font-family:Cinzel;
    color:#c9a55c;
    font-size:40px;
    letter-spacing:5px;
    animation: zoom 1.5s ease;
}

@keyframes zoom {
    from {transform:scale(0.5); opacity:0;}
    to {transform:scale(1); opacity:1;}
}

@keyframes fadeOut {
    to {opacity:0; visibility:hidden;}
}

/* NAV */
header {
    position:fixed;
    top:0;
    width:100%;
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:20px 40px;
    background:#111;
    border-bottom:1px solid #c9a55c;
    z-index:1000;
}

.logo {
    font-family:Cinzel;
    color:#c9a55c;
}

nav button {
    background:none;
    border:none;
    color:#fff;
    margin-left:10px;
    cursor:pointer;
}

nav button:hover {
    color:#c9a55c;
}

/* SEKCJE */
section {
    padding:120px 20px;
    text-align:center;

    opacity:0;
    transform:translateY(50px);
    transition:0.8s;
}

section.visible {
    opacity:1;
    transform:translateY(0);
}

h1,h2 {
    font-family:Cinzel;
    color:#c9a55c;
}

.line {
    width:80px;
    height:2px;
    background:#c9a55c;
    margin:20px auto;
}

.card {
    max-width:900px;
    margin:auto;
    background:#111;
    padding:30px;
    border-radius:10px;
}

/* USŁUGI */
.services {
    display:flex;
    flex-wrap:wrap;
    justify-content:center;
    gap:20px;
}

.service {
    width:220px;
    background:#1a1a1a;
    padding:20px;
    cursor:pointer;
}

.details {
    max-height:0;
    opacity:0;
    transition:0.4s;
}

.service.active .details {
    max-height:200px;
    opacity:1;
}

/* GALERIA */
.gallery {
    display:flex;
    flex-wrap:wrap;
    gap:15px;
    justify-content:center;
}

.gallery-item {
    position:relative;
    width:250px;
    height:160px;
}

.gallery-item img {
    width:100%;
    height:100%;
    object-fit:cover;
}

.overlay {
    position:absolute;
    width:100%;
    height:100%;
    background:rgba(0,0,0,0.7);
    display:flex;
    justify-content:center;
    align-items:center;
    opacity:0;
    transition:0.4s;
}

.gallery-item.active .overlay {
    opacity:1;
}

/* RESPONSYWNOŚĆ */
@media(max-width:768px){
    .service {width:100%;}
    .gallery-item {width:100%;}
}

</style>
</head>

<body>

<div id="intro"><h1>RUSZNIKARZ</h1></div>

<header>
<div class="logo">RUSZNIKARZ</div>
<nav>
<button onclick="go('home')">Home</button>
<button onclick="go('about')">O nas</button>
<button onclick="go('services')">Usługi</button>
<button onclick="go('gallery')">Realizacje</button>
<button onclick="go('law')">Prawo</button>
<button onclick="go('contact')">Kontakt</button>
</nav>
</header>

<section id="home">
<h1>RUSZNIKARZ</h1>
<p>Specjalistyczna Pracownia</p>
<img src="spust.jpg" style="width:200px;">
</section>

<section id="about">
<div class="card">
<h2>O nas</h2>
<div class="line"></div>
<p>Profesjonalna rusznikarnia...</p>
</div>
</section>

<section id="services">
<h2>Usługi</h2>
<div class="line"></div>

<div class="services">

<div class="service">
<h3>Naprawa</h3>
<div class="details">
<p>Diagnostyka</p>
<p>Naprawa</p>
</div>
</div>

<div class="service">
<h3>Konserwacja</h3>
<div class="details">
<p>Czyszczenie</p>
</div>
</div>

</div>
</section>

<section id="gallery">
<h2>Realizacje</h2>
<div class="line"></div>

<div class="gallery">

<div class="gallery-item">
<img src="karabin.jpg">
<div class="overlay">Regulacja</div>
</div>

</div>
</section>

<section id="law">
<div class="card">
<h2>Prawo</h2>
<p>Legalność</p>
<button onclick="showSaul()">📞</button>
</div>

<div id="saul" style="display:none;">
<h2>In legal trouble?</h2>
<img src="saul.jpg" style="width:200px;">
</div>
</section>

<section id="contact">
<h2>Kontakt</h2>
</section>

<script>

/* scroll */
function go(id){
    document.getElementById(id).scrollIntoView();
}

/* animacje scroll */
function reveal(){
    document.querySelectorAll("section").forEach(sec=>{
        if(sec.getBoundingClientRect().top < window.innerHeight*0.8){
            sec.classList.add("visible");
        }
    });
}

window.addEventListener("scroll",reveal);
window.addEventListener("load",reveal);

/* klik mobile */
document.querySelectorAll(".service").forEach(el=>{
    el.onclick=()=>el.classList.toggle("active");
});

document.querySelectorAll(".gallery-item").forEach(el=>{
    el.onclick=()=>el.classList.toggle("active");
});

/* saul */
function showSaul(){
    document.getElementById("saul").style.display="block";
}

</script>

</body>
</html>
